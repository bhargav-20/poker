name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One production deploy at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      # Fast safety net — don't ship a build if the engine is broken.
      - run: pnpm --filter @poker/engine test

      - name: Build client
        env:
          GH_PAGES: "true"
          # Deployed PartyKit host, e.g. "poker.<you>.partykit.dev".
          # Set it in repo Settings → Secrets and variables → Actions → Variables.
          VITE_PARTYKIT_HOST: ${{ vars.VITE_PARTYKIT_HOST }}
        run: pnpm --filter web build

      - name: SPA fallback + disable Jekyll
        run: |
          cp apps/web/dist/index.html apps/web/dist/404.html
          touch apps/web/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
